teleop_twist_joy:
  ros__parameters:
    require_enable_button: false

    axis_linear.x: 1 # Left thumb stick vertical
    scale_linear.x: 0.15
    scale_linear_turbo.x: 0.25

    axis_angular.yaw: 0 # Left thumb stick horizontal
    scale_angular.yaw: 0.75
    scale_angular_turbo.yaw: 1.5

    enable_button: 4 # Left shoulder
    enable_turbo_button: 5 # Right shoulder
